# LiteLLM Gateway Configuration
# Track 2: LLM Router Gateway Integration
# Provider switching is gateway-config ONLY — no agent code changes needed.

model_list:
  # ─── OpenAI ────────────────────────────────────────────────────────────────
  - model_name: gpt-4o
    litellm_params:
      model: openai/gpt-4o
      api_key: "os.environ/OPENAI_API_KEY"
      rpm: 500
      tpm: 100000

  - model_name: gpt-4
    litellm_params:
      model: openai/gpt-4
      api_key: "os.environ/OPENAI_API_KEY"
      rpm: 500
      tpm: 100000

  - model_name: gpt-3.5-turbo
    litellm_params:
      model: openai/gpt-3.5-turbo
      api_key: "os.environ/OPENAI_API_KEY"
      rpm: 3000
      tpm: 200000

  # ─── Anthropic ─────────────────────────────────────────────────────────────
  - model_name: claude-3-5-sonnet
    litellm_params:
      model: anthropic/claude-3-5-sonnet-20241022
      api_key: "os.environ/ANTHROPIC_API_KEY"
      rpm: 200
      tpm: 100000

  - model_name: claude-3-haiku
    litellm_params:
      model: anthropic/claude-3-haiku-20240307
      api_key: "os.environ/ANTHROPIC_API_KEY"
      rpm: 300
      tpm: 150000

  # ─── Google Gemini (FREE tier — recommended default for demos) ───────────
  - model_name: gemini-flash        # cheapest, fastest
    litellm_params:
      model: gemini/gemini-1.5-flash
      api_key: "os.environ/GEMINI_API_KEY"
      rpm: 1000
      tpm: 1000000

  - model_name: gemini-pro
    litellm_params:
      model: gemini/gemini-1.5-pro
      api_key: "os.environ/GEMINI_API_KEY"
      rpm: 360
      tpm: 500000

  - model_name: gemini-2-flash
    litellm_params:
      model: gemini/gemini-2.0-flash
      api_key: "os.environ/GEMINI_API_KEY"
      rpm: 1000
      tpm: 1000000

  # ─── xAI Grok ──────────────────────────────────────────────────────────────
  - model_name: grok-beta
    litellm_params:
      model: xai/grok-beta
      api_key: "os.environ/XAI_API_KEY"
      rpm: 60
      tpm: 131072

  - model_name: grok-2
    litellm_params:
      model: xai/grok-2
      api_key: "os.environ/XAI_API_KEY"
      rpm: 60
      tpm: 131072

# ─── Router: which model agents get when they don't specify ──────────────────
# CHANGE THIS ONE LINE to switch all agents to a different provider.
# No agent code changes needed. This is the core value of Track 2.
router_settings:
  default_model: gemini-flash       # ← swap to gpt-4o / claude-3-5-sonnet / grok-beta
  routing_strategy: simple-shuffle
  enable_pre_call_checks: true
  timeout: 60
  num_retries: 3
  fallbacks:
    - gemini-flash:
        - gpt-3.5-turbo
        - claude-3-haiku

# ─── Virtual Keys ────────────────────────────────────────────────────────────
virtual_key_defaults:
  max_budget: 100.0
  budget_duration: "30d"
  tpm_limit: 100000
  rpm_limit: 1000
  allowed_models: null

# ─── General ─────────────────────────────────────────────────────────────────
general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"
  proxy_batch_write_at: 60
  database_connection_pool_limit: 10
  ui_access_mode: "admin"
  enable_ratelimiting: true

# ─── Observability (OpenTelemetry → Arize Phoenix) ───────────────────────────
litellm_settings:
  success_callback: ["otel"]
  failure_callback: ["otel"]
  service_callback: ["otel"]
  redact_messages_in_logs: false   # keep visible for demo tracing
  telemetry: false

# ─── Caching ─────────────────────────────────────────────────────────────────
cache: true
cache_params:
  type: redis
  host: "os.environ/REDIS_HOST"
  port: "os.environ/REDIS_PORT"
  password: "os.environ/REDIS_PASSWORD"
  ttl: 3600